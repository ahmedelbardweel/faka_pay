services:
  - type: web
    name: faka-pay
    runtime: docker
    plan: free
    startCommand: |
      echo "--- Starting Startup Script ---"
      echo "Running Migrations..."
      php artisan migrate --force || echo "Migration failed!"
      echo "Clearing Caches..."
      php artisan config:clear
      php artisan cache:clear
      echo "Starting Apache..."
      apache2-foreground
    envVars:
      - key: APP_ENV
        value: local
      - key: APP_DEBUG
        value: true
      - key: LOG_LEVEL
        value: debug
      - key: LOG_CHANNEL
        value: stderr
      - key: DB_CONNECTION
        value: pgsql
      - key: DATABASE_URL
        fromDatabase:
          name: faka-pay-db
          property: connectionString

databases:
  - name: faka-pay-db
    plan: free
