services:
  - type: web
    name: faka-pay
    runtime: docker
    plan: free
    startCommand: php artisan migrate --force && apache2-foreground
    envVars:
      - key: APP_ENV
        value: production
      - key: DB_CONNECTION
        value: pgsql
      - key: DATABASE_URL
        fromDatabase:
          name: faka-pay-db
          property: connectionString

databases:
  - name: faka-pay-db
    plan: free
